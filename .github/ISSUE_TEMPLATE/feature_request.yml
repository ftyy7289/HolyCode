name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make HolyCode better? We'd love to hear it.

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New feature
        - Enhancement to existing feature
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: Describe the feature you'd like added
    validations:
      required: true

  - type: textarea
    id: usecase
    attributes:
      label: Use case
      description: How would you use this? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative tools you've tried?
